<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>
    <link rel="stylesheet" href="">
</head>

<body>
    <div class="profile-container">
        <nav class="panel-core">
            <a href="profile.html">∆</a>
            <a href="#">∆</a>
        </nav>

        <header class="meta-grid" id="personal-meta">
            <section class="user-core">
                <h1 class="name-meta">Profile-Grape</h1>
                <div class="user-info">
                    <h2 class="username-meta">Username: GrapeUser</h2>
                    <p class="user-year">Birth Year: Your Birth Year</p>
                    <p class="bio-meta">This is a sample bio for the GrapeUser. It can be updated to reflect the user's personality and interests.</p>
                    <button type="button" class="edit-profile-btn">Modify Identity</button>

                    <form class="edit-mode">
                        <label for="edit-username">Username:</label>
                        <input type="text" id="edit-username" placeholder="New Username">

                        <label for="edit-year">Birth Year:</label>
                        <input type="text" inputmode="numeric" maxlength="10" id="edit-year" placeholder="Birth Year">

                        <label for="edit-bio">Bio:</label>
                        <textarea id="edit-bio" placeholder="New Bio"></textarea>

                        <button type="submit" id="save-profile-btn">Save Changes</button>
                        <button type="button" id="cancel-edit-btn">Cancel</button>
                    </form>
                </div>
            </section>
        </header>

        <main class="personal-impulse" id="impulse-grid">

        </main>

        <footer class="profile-footer">
            <p>© 2026 Grape. All rights reserved.</p>
            <p>That wraps up the latest impulses; stay tuned for the next spark</p>
        </footer>
    </div>

    <script defer>
        //profile script
    </script>
</body>
</html>
